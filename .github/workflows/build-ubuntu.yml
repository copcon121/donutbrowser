name: Build Ubuntu

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: "pnpm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libxdo-dev pkg-config xdg-utils

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workdir: ./src-tauri

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm exec next build

      - name: Verify frontend dist
        run: |
          if [ ! -d "dist" ]; then
            echo "Error: dist directory not found"
            ls -la
            exit 1
          fi
          echo "Frontend dist OK"

      - name: Build sidecar binaries
        working-directory: ./src-tauri
        run: |
          cargo build --bin donut-proxy --target x86_64-unknown-linux-gnu --release
          cargo build --bin donut-daemon --target x86_64-unknown-linux-gnu --release

      - name: Copy sidecar binaries
        run: |
          mkdir -p src-tauri/binaries
          cp src-tauri/target/x86_64-unknown-linux-gnu/release/donut-proxy src-tauri/binaries/donut-proxy-x86_64-unknown-linux-gnu
          cp src-tauri/target/x86_64-unknown-linux-gnu/release/donut-daemon src-tauri/binaries/donut-daemon-x86_64-unknown-linux-gnu
          chmod +x src-tauri/binaries/*

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ./src-tauri
          args: --target x86_64-unknown-linux-gnu --verbose

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: donutbrowser-ubuntu-x64
          path: |
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/rpm/*.rpm
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
          retention-days: 30
